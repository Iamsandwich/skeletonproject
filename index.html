    <h1>Welcome to the skeleton project,
        a kingdom of skeeltons

    <h2>

<div class="player">

    <img id="songimage">
    <div class="songinfo">
        <div class="nowplaying">Now Playing:</div>
        <div id="songname">Name</div>
        
    <div class="nowplaying">Artist:</div>
    <div id="artistname">Artist</div>
</div>
    
    <div class="sliderandbuttons">
     <input id="slidersong" type="range" step="any" min="0" max="100">
       <div id="volumelol">
        <img id="volumebutton" src="img/skeletin-skulll.gif" alt="volume">
       </div> 
     <input id="volumeslider" type="range" step="0.001" min="0" max="1">
    </div>

    <div id="musicbuttons">
        <div id="shufflingimg"><img id="shufflesong" src="img/shuffle button off.png" alt="shuffle button"></div>
        <img id="previoussong" src="img/back button.png" alt="previous button">
        <img id="playsong" src="img/play button.png" alt="play button">
        <img id="pausesong" src="img/pause button.png" alt="pause button">
        <img id="nextsong" src="img/forward button.png" alt="next button">
        <div id="loopbuttonimg"><img id="loopsong" src="img/loop button.png" alt="loop button"></div> 
    </div>

    </div>
    
    <div class="audio">
        <script src="music_player.js"></script>
